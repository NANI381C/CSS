#Desecendant(space)
#Child(>)
#Adjacent sibling(+)
#General sibling(~)
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*Desecendant(space)*/
        div h1{
            color:blue;
            background-color:powderblue;
        }
        /*Child(>)*/
        div>h1{
            color:green;
            background-color:lightgreen;
        }
        /*Adjacent sibling(+)*/
        div+h1{
            color:orange;
            background-color:lightyellow;
        }
        /*General sibling(~)*/
        div~h1{
            color:purple;
            background-color: blanchedalmond;
        }  
    </style>
</head>
<body>
    <div>
        <h1>Hello...</h1>
        <h1>hi...</h1>
        <span>
            <h1>This is heading</h1>
        </span>
    </div>
    <h1>bye...</h1>
    <h1>Welcome...</h1>
</body>
</html>
