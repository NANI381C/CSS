<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeMind — AI Code Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1c1f27;
    --border: #2a2d38;
    --accent: #00e5a0;
    --accent2: #7c6ef5;
    --accent3: #f5a623;
    --text: #e8eaf0;
    --muted: #6b7080;
    --code-bg: #0e1016;
    --danger: #ff5c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Background noise + grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,12,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0.8;
  }

  /* Mode tabs */
  .mode-tabs {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 0;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .tab-btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 24px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main layout */
  .main {
    position: relative;
    z-index: 5;
    display: flex;
    flex: 1;
    gap: 0;
    height: calc(100vh - 118px);
    overflow: hidden;
  }

  /* Left panel - input */
  .input-panel {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lang-select {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  .lang-select option { background: var(--surface2); color: var(--text); }

  textarea {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    background: var(--surface);
    color: var(--text);
    border: none;
    padding: 20px;
    resize: none;
    outline: none;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); font-style: italic; }

  .input-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .char-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .run-btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 10px 28px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,160,0.35); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Right panel - output */
  .output-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .output-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.active { background: var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.done { background: var(--accent); animation: none; }
  .status-dot.error { background: var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .copy-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--text); }

  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .output-body::-webkit-scrollbar { width: 6px; }
  .output-body::-webkit-scrollbar-track { background: transparent; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }

  .empty-state h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 13px;
    max-width: 280px;
    line-height: 1.6;
    opacity: 0.5;
  }

  /* Output content */
  .output-content {
    display: none;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.4s ease;
  }

  .output-content.visible { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Sections */
  .section {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .section-header {
    padding: 12px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-icon {
    width: 20px; height: 20px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  .section-icon.code { background: rgba(124,110,245,0.2); color: var(--accent2); }
  .section-icon.explain { background: rgba(0,229,160,0.15); color: var(--accent); }
  .section-icon.tip { background: rgba(245,166,35,0.15); color: var(--accent3); }

  .section-body {
    padding: 20px;
    background: var(--surface);
  }

  pre {
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--code-bg);
    border-radius: 8px;
    padding: 18px;
    border: 1px solid var(--border);
  }

  .explanation-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }

  .explanation-text strong { color: var(--accent); }
  .explanation-text code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent2);
  }

  /* Loading skeleton */
  .skeleton {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .skeleton.visible { display: flex; }

  .skel-block {
    height: 14px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    border-radius: 4px;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Quick prompts */
  .quick-prompts {
    padding: 0 20px 16px;
  }

  .quick-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .prompt-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,229,160,0.05); }

  /* Error state */
  .error-msg {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 20px;
    background: rgba(255,92,92,0.08);
    border: 1px solid rgba(255,92,92,0.25);
    border-radius: 10px;
    font-size: 13px;
    color: var(--danger);
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Code<span>Mind</span></div>
  </div>
  <div class="header-badge">Powered by Claude</div>
</header>

<div class="mode-tabs">
  <button class="tab-btn active" data-mode="generate">⚙ Generate Code</button>
  <button class="tab-btn" data-mode="explain">🔍 Explain Code</button>
  <button class="tab-btn" data-mode="fix">🛠 Fix & Improve</button>
</div>

<div class="main">
  <!-- Input panel -->
  <div class="input-panel">
    <div class="panel-header">
      <span class="panel-label" id="input-label">Describe what to build</span>
      <select class="lang-select" id="lang-select">
        <option value="auto">Auto Detect</option>
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="typescript">TypeScript</option>
        <option value="rust">Rust</option>
        <option value="go">Go</option>
        <option value="java">Java</option>
        <option value="c++">C++</option>
        <option value="sql">SQL</option>
        <option value="bash">Bash</option>
        <option value="html/css">HTML/CSS</option>
      </select>
    </div>

    <textarea id="user-input" placeholder="e.g. Build a debounce function in JavaScript that delays execution until after a wait time has elapsed..."></textarea>

    <div class="quick-prompts">
      <div class="quick-label">Quick prompts</div>
      <div class="prompt-chips" id="chips"></div>
    </div>

    <div class="input-footer">
      <span class="char-count" id="char-count">0 chars</span>
      <button class="run-btn" id="run-btn">
        <span id="btn-icon">▶</span>
        <span id="btn-text">Run</span>
      </button>
    </div>
  </div>

  <!-- Output panel -->
  <div class="output-panel">
    <div class="output-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="status-dot" id="status-dot"></div>
        <span class="panel-label" id="output-label">Output</span>
      </div>
      <button class="copy-btn" id="copy-btn" style="display:none">Copy All</button>
    </div>

    <div class="output-body" id="output-body">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🤖</div>
        <h3>Ready to assist</h3>
        <p>Describe what you want to build, paste code to explain, or ask for a fix.</p>
      </div>

      <!-- Skeleton loader -->
      <div class="skeleton" id="skeleton">
        <div class="skel-block" style="width:60%; height:18px;"></div>
        <div class="skel-block" style="width:100%; height:120px;"></div>
        <div class="skel-block" style="width:80%;"></div>
        <div class="skel-block" style="width:90%;"></div>
        <div class="skel-block" style="width:70%;"></div>
        <div class="skel-block" style="width:85%;"></div>
      </div>

      <!-- Output content -->
      <div class="output-content" id="output-content"></div>
    </div>
  </div>
</div>

<script>
const MODES = {
  generate: {
    label: 'Describe what to build',
    outputLabel: 'Generated Code',
    chips: [
      'Binary search in Python',
      'REST API with Express.js',
      'Debounce function JS',
      'SQL query with JOIN',
      'React custom hook',
      'Fibonacci with memoization',
    ],
    placeholder: 'e.g. Build a debounce function in JavaScript that delays execution until after a wait time has elapsed...',
    system: (lang) => `You are an expert software engineer and code generator.
The user will describe something to build. Respond in this EXACT JSON format:
{
  "code": "the complete, working code here",
  "language": "detected or specified language",
  "explanation": "A clear explanation of how the code works, what each major part does, written in plain English with inline code references.",
  "tips": "1-2 pro tips, best practices, or edge cases to watch for"
}
Language preference: ${lang === 'auto' ? 'detect from context' : lang}.
Return ONLY valid JSON, no markdown fences, no extra text.`
  },
  explain: {
    label: 'Paste code to explain',
    outputLabel: 'Code Explanation',
    chips: [
      'What does this do?',
      'Explain line by line',
      'Find bugs in this',
      'What\'s the complexity?',
      'Explain the pattern used',
    ],
    placeholder: 'Paste any code snippet here and I\'ll explain what it does, how it works, and highlight important details...',
    system: (lang) => `You are an expert code explainer and teacher.
The user will paste code. Explain it clearly. Respond in this EXACT JSON format:
{
  "code": "the original code unchanged",
  "language": "the language of the code",
  "explanation": "A thorough, beginner-friendly explanation covering: what the code does overall, what each important part does, and any notable patterns or techniques used.",
  "tips": "Any improvements, potential bugs, or interesting things to note about this code"
}
Return ONLY valid JSON, no markdown fences, no extra text.`
  },
  fix: {
    label: 'Paste code to fix / improve',
    outputLabel: 'Fixed Code',
    chips: [
      'Fix the bug',
      'Improve performance',
      'Add error handling',
      'Make it more readable',
      'Convert to async/await',
      'Add TypeScript types',
    ],
    placeholder: 'Paste broken or messy code here. Describe what\'s wrong or what you want improved...',
    system: (lang) => `You are an expert code reviewer and debugger.
The user will paste code that needs fixing or improvement. Respond in this EXACT JSON format:
{
  "code": "the improved/fixed version of the code",
  "language": "the language of the code",
  "explanation": "What was wrong or could be improved, and what changes you made and why.",
  "tips": "Additional suggestions for making the code even better in the future"
}
Return ONLY valid JSON, no markdown fences, no extra text.`
  }
};

let currentMode = 'generate';
let rawOutput = '';

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    applyMode();
  });
});

function applyMode() {
  const m = MODES[currentMode];
  document.getElementById('input-label').textContent = m.label;
  document.getElementById('user-input').placeholder = m.placeholder;
  renderChips(m.chips);
  resetOutput();
}

function renderChips(chips) {
  const el = document.getElementById('chips');
  el.innerHTML = '';
  chips.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = c;
    chip.onclick = () => {
      document.getElementById('user-input').value = c;
      updateCharCount();
    };
    el.appendChild(chip);
  });
}

// Char count
const textarea = document.getElementById('user-input');
textarea.addEventListener('input', updateCharCount);
function updateCharCount() {
  document.getElementById('char-count').textContent = textarea.value.length + ' chars';
}

// Reset output
function resetOutput() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('skeleton').classList.remove('visible');
  document.getElementById('output-content').classList.remove('visible');
  document.getElementById('output-content').innerHTML = '';
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('status-dot').className = 'status-dot';
  document.getElementById('output-label').textContent = 'Output';
}

// Run
document.getElementById('run-btn').addEventListener('click', run);
textarea.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') run();
});

async function run() {
  const input = textarea.value.trim();
  if (!input) { textarea.focus(); return; }

  const lang = document.getElementById('lang-select').value;
  const mode = MODES[currentMode];

  // UI loading state
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('output-content').classList.remove('visible');
  document.getElementById('skeleton').classList.add('visible');
  document.getElementById('status-dot').className = 'status-dot active';
  document.getElementById('output-label').textContent = 'Thinking...';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('btn-text').textContent = 'Running...';
  document.getElementById('copy-btn').style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: mode.system(lang),
        messages: [{ role: 'user', content: input }]
      })
    });

    const data = await response.json();
    const raw = data.content?.map(i => i.text || '').join('') || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    rawOutput = parsed.code || '';
    renderOutput(parsed, mode.outputLabel);

  } catch (err) {
    showError('Something went wrong. Check your API key or try again. (' + (err.message || err) + ')');
  } finally {
    document.getElementById('run-btn').disabled = false;
    document.getElementById('btn-text').textContent = 'Run';
    document.getElementById('btn-icon').textContent = '▶';
  }
}

function renderOutput(data, title) {
  document.getElementById('skeleton').classList.remove('visible');
  document.getElementById('status-dot').className = 'status-dot done';
  document.getElementById('output-label').textContent = title + (data.language ? ` · ${data.language}` : '');

  const container = document.getElementById('output-content');
  container.innerHTML = '';

  // Code section
  if (data.code) {
    container.innerHTML += `
      <div class="section">
        <div class="section-header">
          <div class="section-icon code">⌨</div>
          <span style="color:var(--accent2)">Code</span>
          ${data.language ? `<span style="color:var(--muted);font-weight:400;margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;">${data.language}</span>` : ''}
        </div>
        <div class="section-body">
          <pre>${escapeHtml(data.code)}</pre>
        </div>
      </div>`;
  }

  // Explanation section
  if (data.explanation) {
    container.innerHTML += `
      <div class="section">
        <div class="section-header">
          <div class="section-icon explain">✦</div>
          <span style="color:var(--accent)">Explanation</span>
        </div>
        <div class="section-body">
          <div class="explanation-text">${formatExplanation(data.explanation)}</div>
        </div>
      </div>`;
  }

  // Tips section
  if (data.tips) {
    container.innerHTML += `
      <div class="section">
        <div class="section-header">
          <div class="section-icon tip">★</div>
          <span style="color:var(--accent3)">Pro Tips</span>
        </div>
        <div class="section-body">
          <div class="explanation-text">${formatExplanation(data.tips)}</div>
        </div>
      </div>`;
  }

  container.classList.add('visible');
  document.getElementById('copy-btn').style.display = 'block';
}

function showError(msg) {
  document.getElementById('skeleton').classList.remove('visible');
  document.getElementById('status-dot').className = 'status-dot error';
  document.getElementById('output-label').textContent = 'Error';

  const container = document.getElementById('output-content');
  container.innerHTML = `<div class="error-msg"><span>⚠</span><span>${escapeHtml(msg)}</span></div>`;
  container.classList.add('visible');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatExplanation(text) {
  return escapeHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

// Copy
document.getElementById('copy-btn').addEventListener('click', () => {
  if (!rawOutput) return;
  navigator.clipboard.writeText(rawOutput).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy All', 2000);
  });
});

// Init
applyMode();
</script>
</body>
</html>
